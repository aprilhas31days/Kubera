<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ledger - Empty State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#690005",
              "on-tertiary-container": "#000000",
              "surface-tint": "#c6c6c7",
              "surface-container-lowest": "#0e0e0e",
              "on-surface": "#e5e2e1",
              "inverse-primary": "#5d5f5f",
              "surface-variant": "#353534",
              "on-secondary-container": "#e3e2e2",
              "error": "#ffb4ab",
              "background": "#131313",
              "outline-variant": "#474747",
              "inverse-surface": "#e5e2e1",
              "on-primary-fixed": "#ffffff",
              "on-tertiary-fixed": "#ffffff",
              "on-secondary-fixed-variant": "#3b3b3c",
              "tertiary-fixed-dim": "#474746",
              "secondary-fixed": "#c7c6c6",
              "primary-container": "#d4d4d4",
              "outline": "#919191",
              "on-secondary": "#1b1c1c",
              "surface-container": "#201f1f",
              "surface-container-low": "#1c1b1b",
              "tertiary-fixed": "#5f5e5e",
              "primary-fixed-dim": "#454747",
              "surface-bright": "#393939",
              "tertiary": "#e5e2e1",
              "on-primary-fixed-variant": "#e2e2e2",
              "on-background": "#e5e2e1",
              "secondary": "#c7c6c6",
              "on-secondary-fixed": "#1b1c1c",
              "on-primary-container": "#000000",
              "on-tertiary-fixed-variant": "#e5e2e1",
              "surface-container-high": "#2a2a2a",
              "surface": "#131313",
              "on-tertiary": "#1c1b1b",
              "tertiary-container": "#929090",
              "primary-fixed": "#5d5f5f",
              "error-container": "#93000a",
              "secondary-container": "#464747",
              "surface-container-highest": "#353534",
              "on-primary": "#1a1c1c",
              "inverse-on-surface": "#313030",
              "surface-dim": "#131313",
              "secondary-fixed-dim": "#ababab",
              "on-error-container": "#ffdad6",
              "primary": "#ffffff",
              "on-surface-variant": "#c6c6c6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0rem", "lg": "0rem", "xl": "0rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #131313;
        color: #e5e2e1;
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-background">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-start justify-center px-8 md:px-24 py-16">
<div class="max-w-4xl w-full flex flex-col items-start">
<!-- Display Headline -->
<h2 class="text-[3.5rem] font-normal leading-none tracking-[-0.02em] text-primary mb-8 max-w-2xl">
            LEDGER EMPTY
        </h2>
<!-- Editorial Description -->
<p class="text-[0.875rem] leading-[1.6] text-on-surface max-w-md mb-16">
            No transactions found. Synchronize your ledger by loading bank SMS messages. This process will index incoming financial data into your private journal.
        </p>
<!-- Primary Action -->
<button class="bg-primary text-on-primary px-12 py-5 text-[0.6875rem] tracking-[0.1em] uppercase font-medium hover:bg-secondary transition-colors duration-200 focus:outline-none">
            LOAD FROM SMS
        </button>
</div>
</main>
<!-- Background Decoration (Brutalist Noise/Gradients) -->
<div class="fixed inset-0 pointer-events-none opacity-20 z-[-1] overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] bg-gradient-to-br from-surface-container-highest to-transparent blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] bg-gradient-to-tr from-surface-container-low to-transparent blur-[100px]"></div>
</div>
</body></html>
