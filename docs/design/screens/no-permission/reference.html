<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SMS Access Required</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131313;
            color: #E0E0E0;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Subtle radial gradient to match IMAGE_5's depth */
        .bg-monolithic {
            background: radial-gradient(circle at 70% 20%, #1c1c1c 0%, #131313 60%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 2rem;
        }

        .headline {
            font-size: 3.5rem;
            line-height: 1.1;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 2rem;
            color: #FFFFFF;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: #A3A3A3;
            max-width: 90%;
            margin-bottom: 3.5rem;
        }

        .btn-primary {
            background-color: #FFFFFF;
            color: #131313;
            border-radius: 0; /* Strict 0px radius as per TEXT_9 */
            padding: 1rem 2rem;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
            display: inline-block;
            text-align: center;
            width: fit-content;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:active {
            opacity: 0.9;
        }
    </style>
</head>
<body class="antialiased">
<main class="bg-monolithic">
<div class="max-w-md">
<h1 class="headline">
                SMS ACCESS<br/>REQUIRED
            </h1>
<p class="description">
                To synchronize your financial records, this application requires read access to bank SMS messages. Data is processed locally on your device to maintain your private journal.
            </p>
<button class="btn-primary">
                GRANT ACCESS
            </button>
</div>
</main>
</body></html>
